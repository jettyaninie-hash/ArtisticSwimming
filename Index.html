        "L»":0.20,"L!»":0.30,"L":0.50,"Lf»":0.50,"L!f»":0.50,"L!":0.70,"Lf":0.70,"Lr0,5":0.90,"L!R1":1.10,
        "L!r1":1.10,"L!FR0,5":1.10,"L!FR1":1.30,"W":0.90,"W»":0.90,"WLD":1.10,"WD":1.10,"J":0.90,"JD":1.30,
        "JF":1.10,"JR0,5":1.10,"JS1B":1.50,"JS1F":2.10,"JFS1B":2.10,"SL>":0.90,"SL!>":0.90
    };
    
    // 风险提示函数
    function getRiskMsg(code) {
        const upperCode = code.toUpperCase();
        if (upperCode.startsWith("T")) return t('thrustRisk');
        if (upperCode.startsWith("S")) return t('spinRisk');
        if (upperCode.match(/^[12]?R/)) return t('twistRisk');
        if (upperCode.startsWith("A")) return t('airborneRisk');
        if (upperCode.startsWith("F")) return t('flexibilityRisk');
        if (upperCode.startsWith("C")) return t('connectionRisk');
        return t('defaultRisk');
    }

    function parseSequence(codesStr) {
        let upperStr = codesStr.toUpperCase();
        let tokens = upperStr.trim().split(/[\s,]+/).filter(t => t);
        let total = 0, unknown = [], details = [];
        tokens.forEach(code => {
            let v = difficultyMap[code];
            if (v !== undefined) { total += v; details.push({code, value: v}); }
            else { unknown.push(code); details.push({code, value: '?'}); }
        });
        return { total, finalScore: total + 0.5, unknown, count: tokens.length, details };
    }
    
    function getFamily(code) {
        let u = code.toUpperCase();
        if (u.startsWith("T")) return "T";
        if (u.startsWith("S")) return "S";
        if (u.match(/^[12]?R/)) return "R";
        if (u.startsWith("A")) return "A";
        if (u.startsWith("F")) return "F";
        return "X";
    }
    
    function checkHybrid(codesStr) {
        let tokens = codesStr.toUpperCase().trim().split(/[\s,]+/).filter(t => t);
        let errors = [];
        if (tokens.length < 5) errors.push(`❌ Less than 5 moves (${tokens.length})`);
        let famCount = {T:0,S:0,R:0,A:0,F:0};
        let codeCnt = new Map();
        tokens.forEach(code => {
            let f = getFamily(code);
            if (famCount.hasOwnProperty(f)) famCount[f]++;
            codeCnt.set(code, (codeCnt.get(code)||0)+1);
        });
        for (let [c,n] of codeCnt) if (n>3) errors.push(`${c} x${n} >3`);
        return { errors, families: Object.keys(famCount).filter(f=>famCount[f]>0) };
    }
    
    function checkGlobalFamilies(allFamilies) {
        let global = new Set();
        allFamilies.forEach(fams => fams.forEach(f => global.add(f)));
        let missing = ["T","S","R","A","F"].filter(r => !global.has(r));
        return { pass: missing.length===0, missing };
    }
    
    function generateRiskHTML(sequencesArr, acroData) {
        if ((!sequencesArr || sequencesArr.length === 0) && (!acroData || acroData.length === 0)) 
            return `<div>${t('riskEmpty')}</div>`;
        let html = '';
        if (sequencesArr) {
            sequencesArr.forEach((seq, idx) => {
                let codes = seq.toUpperCase().trim().split(/[\s,]+/).filter(t => t);
                if (codes.length === 0) return;
                html += `<div style="margin-bottom:20px; background:#fff9e6; padding:12px; border-radius:16px;">`;
                html += `<strong style="background:#1e88e5; color:white; padding:2px 12px; border-radius:20px;">${t('hybrid')} ${idx+1}</strong><br><br>`;
                codes.forEach(code => {
                    let risk = getRiskMsg(code);
                    let val = difficultyMap[code];
                    html += `<div class="risk-item">`;
                    html += `<span class="risk-code">${code} (${val?val.toFixed(2):'?'})</span>`;
                    html += `<div class="risk-detail">${risk}</div>`;
                    html += `</div>`;
                });
                html += `</div>`;
            });
        }
        if (acroData && acroData.length) {
            html += `<div style="margin-top:15px; background:#e8f0fe; padding:12px; border-radius:16px;">`;
            html += `<strong style="background:#6c757d; color:white; padding:2px 12px; border-radius:20px;">🏅 ${t('acroTitle')}</strong><br><br>`;
            acroData.forEach(acro => {
                if (acro.code) {
                    html += `<div class="risk-item">`;
                    html += `<span class="risk-code">${acro.code} (${(acro.value||0).toFixed(2)})</span>`;
                    html += `<div class="risk-detail">${getRiskMsg(acro.code)}</div>`;
                    html += `</div>`;
                }
            });
            html += `</div>`;
        }
        html += `<div style="margin-top:15px; padding:8px; background:#f0f4f8; border-radius:12px; font-size:0.65rem; color:#666;">`;
        html += `📖 ${t('rulesRef')}`;
        html += `</div>`;
        return html;
    }

    function getRequiredHybridCount(ageGroup) {
        if (ageGroup === 'senior' || ageGroup === 'junior') return 6;
        if (ageGroup === 'youth') return 5;
        return 4;
    }
    
    function getRequiredAcroCount(discipline, ageGroup) {
        if (discipline === 'soloWomen' || discipline === 'soloMen') return 0;
        if (discipline === 'duetWomen') return 2;
        if (discipline === 'mixedDuet') return 3;

    }

    function loadRecordToEditor(rec) {
        if (rec.sequences.length !== currentRequiredCount) rebuildHybridInputs(rec.sequences.length);
        for (let i=0; i<rec.sequences.length; i++) {
            let ta = document.getElementById(`seq-${i}`);
            if (ta) ta.value = rec.sequences[i] || '';
        }
        if (rec.info) {
            let fields = ['athleteName', 'eventName', 'ageGroup', 'theme', 'musicTitle', 'notes', 'preparedBy', 'coachName'];
            fields.forEach(f => { let el = document.getElementById(f); if(el && rec.info[f]) el.value = rec.info[f]; });
            if (rec.info.acrobatics) {
                let needed = getRequiredAcroCount(document.getElementById('disciplineSelect')?.value || 'duetWomen', document.getElementById('ageCategorySelect')?.value || 'senior');
                rebuildAcroInputs(needed);
                for (let i=0; i<rec.info.acrobatics.length && i<needed; i++) {
                    let inputs = document.querySelectorAll('.acro-row');
                    if (inputs[i]) {
                        let codeInput = inputs[i].querySelector('.acro-code');
                        let valInput = inputs[i].querySelector('.acro-val');
                        if (codeInput) codeInput.value = rec.info.acrobatics[i].code;
                        if (valInput) valInput.value = rec.info.acrobatics[i].value;
                        acroList[i] = { code: rec.info.acrobatics[i].code, value: rec.info.acrobatics[i].value };
                    }
                }
            }
        }
        performCalculation();
    }

    function getAcroTotal() { return acroList.reduce((sum, a) => sum + (a.value || 0), 0); }

    let isCalculating = false;
    function performCalculation() {
        if (isCalculating) return;
        isCalculating = true;
        const calcBtn = document.getElementById('calcBtn');
        const originalText = calcBtn.innerText;
        calcBtn.innerText = currentLang === 'zh' ? "计算中..." : "Calculating...";
        calcBtn.disabled = true;
        
        try {
            let hyTotal = 0, allFamilies = [], seqData = [], actualCount = 0;
            for (let i = 0; i < currentRequiredCount; i++) {
                let ta = document.getElementById(`seq-${i}`);
                if (ta) { sequences[i] = ta.value; actualCount++; } else { sequences[i] = ""; }
                seqData[i] = sequences[i];
                let { finalScore, unknown, details } = parseSequence(sequences[i]);
                hyTotal += finalScore;
                let scoreSpan = document.getElementById(`score-${i}`);
                if (scoreSpan) scoreSpan.innerText = `DD: ${finalScore.toFixed(2)}` + (unknown.length ? ` ? ${unknown.join(',')}` : '');
                let { errors, families } = checkHybrid(sequences[i]);
                let div = document.getElementById(`check-${i}`);
                if (div) {
                    let html = errors.length ? `<div style="color:red;">${errors.join('<br>')}</div>` : `<div style="color:green;">✓ ${t('hybridPass')}</div>`;
                    if (unknown.length) html += `<div style="color:red;">? ${t('unknownCode')}: ${unknown.join(',')}</div>`;
                    html += `<div class="code-values">${t('codeValues')} ${details.map(d => `${d.code}:${d.value === '?' ? '?' : d.value.toFixed(2)}`).join(', ')}</div>`;
                    div.innerHTML = html;
                }
                allFamilies.push(families);
            }
            let { pass, missing } = checkGlobalFamilies(allFamilies);
            let acroTotal = getAcroTotal();
            let finalTotal = hyTotal + acroTotal;
            let totalDiv = document.getElementById('totalScore');
            let msg = pass ? t('globalPass') : t('globalFail') + missing.join(',');
            let countMsg = (actualCount !== currentRequiredCount) ? ` ⚠️ ${t('warningCount')}` : ` ✓ ${t('countOk')}`;
            if (totalDiv) {
                totalDiv.style.background = (actualCount === currentRequiredCount && pass) ? "#1e3c72" : "#b71c1c";
                totalDiv.innerHTML = `🏆 ${t('totalWithAcro')}: ${finalTotal.toFixed(2)} &nbsp;&nbsp; ${msg}${countMsg}<br><span style="font-size:0.7rem;">📊 ${t('hybrid')}: ${hyTotal.toFixed(2)} | 🏅 ${t('acroTitle')}: ${acroTotal.toFixed(2)}</span>`;
            }
            currentHybridTotal = hyTotal;
            currentGlobalPass = pass;
            currentSequences = [...seqData];
            
            showToast(t('calcFeedback'));
            autoSaveOnCalculate();
        } catch(err) { 
            console.error("Calculation error:", err);
            showToast("Error: " + err.message, true);
        }
        finally {
            calcBtn.innerText = originalText;
            calcBtn.disabled = false;
            isCalculating = false;
        }
    }

    function showRisk() {
        let html = generateRiskHTML(currentSequences, acroList);
        document.getElementById('riskContent').innerHTML = html;
        document.getElementById('riskReportContainer').style.display = 'block';

    function showSuggestions() {
        let totalScore = currentHybridTotal + getAcroTotal();
        let sugg = [];

            sugg.push(`总难度：${totalScore.toFixed(2)}`);

            else if (totalScore < 20) sugg.push(`✅ 难度偏低，可增加高难度动作`);
            let families = new Set();
            for (let seq of currentSequences) {
                let codes = seq.toUpperCase().trim().split(/[\s,]+/);
                codes.forEach(c => families.add(getFamily(c)));
            }
            let missing = ["T","S","R","A","F"].filter(f => !families.has(f));
            if (missing.length) sugg.push(`❌ 缺少家族：${missing.join(', ')}（Hybrid必须覆盖全部5个家族）`);
            sugg.push(`💡 建议：高难度动作放在开头或结尾，高风险动作分散编排`);
        } else {
            sugg.push(`Total Score: ${totalScore.toFixed(2)}`);
            if (totalScore > 35) sugg.push(`⚠️ High difficulty (>35), consider reducing`);
            let families = new Set();
            for (let seq of currentSequences) {
                let codes = seq.toUpperCase().trim().split(/[\s,]+/);
                codes.forEach(c => families.add(getFamily(c)));
            }
            let missing = ["T","S","R","A","F"].filter(f => !families.has(f));
            if (missing.length) sugg.push(`❌ Missing families: ${missing.join(', ')} (All 5 families required)`);
            sugg.push(`💡 Tip: Place high-difficulty moves at beginning or end`);
        }
        let modalHtml = `<div id="suggestionsModal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; z-index:1000;"><div style="background:white; border-radius:28px; max-width:500px; width:90%; padding:20px;"><h3>${currentLang === 'zh' ? '💡 设计建议' : '💡 Suggestions'}</h3><ul>${sugg.map(s => `<li style="margin-bottom:8px;">${s}</li>`).join('')}</ul><button onclick="this.closest('#suggestionsModal').remove()">${t('close')}</button></div></div>`;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    }

    function rebuildHybridInputs(requiredCount) {
        const container = document.getElementById('seqContainer');
        if (!container) return;
        container.innerHTML = '';
        sequences = new Array(requiredCount).fill("");
        for (let i = 0; i < requiredCount; i++) {
            sequences[i] = "";
            const card = document.createElement('div');
            card.className = 'seq-card';
            card.innerHTML = `
                <div class="seq-header">
                    <span class="seq-title">${t('hybrid')} ${i+1}</span>
                    <span class="seq-score" id="score-${i}">DD: --</span>
                </div>
                <textarea class="seq-input" id="seq-${i}" rows="2" placeholder="Example: T8 A8 F5a F5a F7 RC1 (case insensitive)"></textarea>
                <div class="check-results" id="check-${i}">${t('hybridPass')}</div>
            `;
            container.appendChild(card);
            const textarea = document.getElementById(`seq-${i}`);
            textarea.addEventListener('input', () => { sequences[i] = textarea.value; });
        }
        currentRequiredCount = requiredCount;
    }

    function rebuildAcroInputs(requiredCount) {
        const container = document.getElementById('acroList');
        if (!container) return;
        container.innerHTML = '';
        acroList = [];
        for (let i = 0; i < requiredCount; i++) {
            acroList.push({ code: '', value: 0 });
            const row = document.createElement('div');
            row.className = 'acro-row';
            row.innerHTML = `
                <input type="text" class="acro-code" placeholder="Example: L!r1, Js1F" style="width:140px;">
                <input type="number" step="0.01" class="acro-val" value="0" style="width:90px;">
            `;
            const codeInput = row.querySelector('.acro-code');
            const valInput = row.querySelector('.acro-val');
            const idx = i;
            codeInput.addEventListener('input', (e) => {
                const newCode = e.target.value.trim();
                const mapped = acroMap[newCode.toUpperCase()];
                if (mapped !== undefined) {
                    valInput.value = mapped;
                    acroList[idx] = { code: newCode, value: mapped };
                    codeInput.classList.remove('error');
                } else if (newCode === '') {
                    valInput.value = 0;
                    acroList[idx] = { code: '', value: 0 };
                    codeInput.classList.remove('error');
                } else {
                    valInput.value = 0;
                    acroList[idx] = { code: newCode, value: 0 };
                    codeInput.classList.add('error');
                }
            });
            valInput.addEventListener('input', (e) => {
                acroList[idx].value = parseFloat(e.target.value) || 0;
            });
            container.appendChild(row);
        }
        currentRequiredAcro = requiredCount;
    }

    // 专业Excel导出 - 按照世界泳联教练卡格式
    function exportLocalRecords() {
        let hist = loadHistory();
        if (hist.length === 0) { alert(t('noDataExport')); return; }
        
        const wb = XLSX.utils.book_new();
        
        // 为每条记录创建单独的工作表（像教练卡）
        hist.forEach((rec, idx) => {
            let info = rec.info || {};
            let seqs = rec.sequences || [];
            let acroData = info.acrobatics || [];
            
            // 计算总分（含托举）
            let acroTotal = acroData.reduce((sum, a) => sum + (a.value || 0), 0);
            let totalScore = rec.totalScore + acroTotal;
            
            // 构建教练卡格式的数据
            const coachCardData = [
                ["=".repeat(80), "", "", "", "", "", "", ""],
                ["WORLD AQUATICS ARTISTIC SWIMMING - DIFFICULTY CALCULATOR", "", "", "", "", "", "", ""],
                ["=".repeat(80), "", "", "", "", "", "", ""],
                ["", "", "", "", "", "", "", ""],
                ["COACH CARD / 教练卡", "", "", "", "", "", "", ""],
                ["", "", "", "", "", "", "", ""],
                ["Member Federation / 会员联合会:", info.memberFederation || "", "Competition / 比赛:", info.eventName || "", "", "", "", ""],
                ["Theme / 主题:", info.theme || "", "Date / 日期:", new Date(rec.timestamp).toLocaleDateString(), "", "", "", ""],
                ["", "", "", "", "", "", "", ""],
                ["ATHLETE INFORMATION / 运动员信息", "", "", "", "", "", "", ""],
                ["-".repeat(60), "", "", "", "", "", "", ""],
                ["Athlete Name / 姓名:", info.athleteName || "", "Event Type / 项目:", info.discipline || "", "", "", "", ""],
                ["Age Group / 年龄组:", info.ageGroup || "", "Category / 类别:", info.category || "", "", "", "", ""],
                ["", "", "", "", "", "", "", ""],
                ["STAFF INFORMATION / 工作人员信息", "", "", "", "", "", "", ""],
                ["-".repeat(60), "", "", "", "", "", "", ""],
                ["Prepared by / 编排人:", info.preparedBy || "", "Coach Name / 教练:", info.coachName || "", "", "", "", ""],
                ["", "", "", "", "", "", "", ""],
                ["HYBRID DECLARATIONS / 组合声明", "", "", "", "", "", "", ""],
                ["-".repeat(60), "", "", "", "", "", "", ""],
                ["Part", "Hybrid Code / 组合代码", "DD Value / 分值", "Movements Count", "Families", "Status", "", ""],
                ["---", "---", "---", "---", "---", "---", "", ""]
            ];
            
            // 添加每个Hybrid
            for (let i = 0; i < seqs.length; i++) {
                let seq = seqs[i] || "";
                let { finalScore, unknown, details } = parseSequence(seq);
                let { errors, families } = checkHybrid(seq);
                let familiesStr = families.join(", ");
                let status = (errors.length === 0 && unknown.length === 0) ? "✓ Valid" : "⚠️ Check";
                coachCardData.push([`Hybrid ${i+1}`, seq, finalScore.toFixed(2), details.length, familiesStr, status, "", ""]);
            }
            
            // 添加托举部分
            if (acroData.length > 0) {
                coachCardData.push(["", "", "", "", "", "", "", ""]);
                coachCardData.push(["ACROBATICS DECLARATIONS / 托举声明", "", "", "", "", "", "", ""]);
                coachCardData.push(["-".repeat(60), "", "", "", "", "", "", ""]);
                coachCardData.push(["Code", "Value", "Status", "", "", "", "", ""]);
                coachCardData.push(["---", "---", "---", "", "", "", "", ""]);
                acroData.forEach(acro => {
                    let status = acro.value > 0 ? "✓ Mapped" : "⚠️ Not Found";
                    coachCardData.push([acro.code || "", (acro.value || 0).toFixed(2), status, "", "", "", "", ""]);
                });
            }
            
            // 添加总分和规则检查
            coachCardData.push(["", "", "", "", "", "", "", ""]);
            coachCardData.push(["=".repeat(60), "", "", "", "", "", "", ""]);
            coachCardData.push(["TOTAL DIFFICULTY SCORE / 总难度分:", totalScore.toFixed(2), "", "", "", "", "", ""]);
            coachCardData.push(["Base Mark (0.5) + Movements + Acrobatics = Total", "", "", "", "", "", "", ""]);
            coachCardData.push(["", "", "", "", "", "", "", ""]);
            coachCardData.push(["RULES CHECK / 规则检查", "", "", "", "", "", "", ""]);
            coachCardData.push(["-".repeat(60), "", "", "", "", "", "", ""]);
            
            // 家族覆盖检查
            let allFamilies = new Set();
            for (let seq of seqs) {
                let { families } = checkHybrid(seq);
                families.forEach(f => allFamilies.add(f));
            }
            let required = ["T", "S", "R", "A", "F"];
            let missing = required.filter(r => !allFamilies.has(r));
            let familyStatus = missing.length === 0 ? "✓ All 5 families covered" : "✗ Missing: " + missing.join(", ");
            coachCardData.push(["Family Coverage / 家族覆盖:", familyStatus, "", "", "", "", "", ""]);
            
            // 每个家族声明数量检查
            let allDeclarations = [];
            for (let seq of seqs) {
                let tokens = seq.toUpperCase().trim().split(/[\s,]+/).filter(t => t);
                allDeclarations.push(...tokens);
            }
            let famCount = {T:0, S:0, R:0, A:0, F:0};
            allDeclarations.forEach(code => {
                let f = getFamily(code);
                if (famCount.hasOwnProperty(f)) famCount[f]++;
            });
            coachCardData.push(["Max 5 declarations per family:", "", "", "", "", "", "", ""]);
            for (let [f, count] of Object.entries(famCount)) {
                let status = count <= 5 ? "✓" : "⚠️ Exceeds";
                coachCardData.push([`  Family ${f}:`, `${count} declarations`, status, "", "", "", "", ""]);
            }
            
            coachCardData.push(["", "", "", "", "", "", "", ""]);
            coachCardData.push(["=".repeat(60), "", "", "", "", "", "", ""]);
            coachCardData.push(["Generated by: Artistic Swimming Difficulty Calculator", "", "", "", "", "", "", ""]);
            coachCardData.push([`Version: ${APP_VERSION} | Rules: Appendix 6 V5.2 (October 2025)`, "", "", "", "", "", "", ""]);
            coachCardData.push(["=".repeat(60), "", "", "", "", "", "", ""]);
            
            // 创建工作表
            const ws = XLSX.utils.aoa_to_sheet(coachCardData);
            
            // 设置列宽
            ws['!cols'] = [{wch:8}, {wch:35}, {wch:12}, {wch:15}, {wch:12}, {wch:12}, {wch:8}, {wch:8}];
            
            // 工作表名称（限制31字符）
            let sheetName = rec.name.replace(/[\\/*?:[\]\\]/g, '').substring(0, 25);
            if (sheetName === "") sheetName = `Record ${idx+1}`;
            XLSX.utils.book_append_sheet(wb, ws, sheetName);
        });
        
        // 创建汇总表
        const summaryRows = [["Summary Report / 汇总报告", "", "", "", "", "", "", ""]];
        summaryRows.push(["=".repeat(80), "", "", "", "", "", "", ""]);
        summaryRows.push(["Name", "Total Score", "Status", "Athlete", "Event", "Age Group", "Prepared By", "Coach Name"]);
        summaryRows.push(["---", "---", "---", "---", "---", "---", "---", "---"]);
        
        hist.forEach(rec => {
            let info = rec.info || {};
            let acroTotal = (info.acrobatics || []).reduce((s,a) => s + (a.value || 0), 0);
            let totalScore = rec.totalScore + acroTotal;
            summaryRows.push([
                rec.name, totalScore.toFixed(2), rec.globalPass ? "Pass" : "Fail",
                info.athleteName || "", info.eventName || "", info.ageGroup || "",
                info.preparedBy || "", info.coachName || ""
            ]);
        });
        
        const summaryWs = XLSX.utils.aoa_to_sheet(summaryRows);
        summaryWs['!cols'] = [{wch:20}, {wch:12}, {wch:8}, {wch:15}, {wch:20}, {wch:12}, {wch:15}, {wch:15}];
        XLSX.utils.book_append_sheet(wb, summaryWs, "Summary");
        
        XLSX.writeFile(wb, `coach_card_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.xlsx`);
        alert(`Exported ${hist.length} record(s) in Coach Card format`);
    }
