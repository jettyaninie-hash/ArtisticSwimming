    function getRiskMsg(code) {
        if (code.startsWith("T")) return currentLang==='zh' ? "Thrust: 高度需达3.5，旋转须逐渐下降" : "Thrust: height >=3.5, spin must descend";
        if (code.startsWith("S")) return currentLang==='zh' ? "Spin: 必须逐渐下降，起始高度>=3.5" : "Spin: must descend, start height >=3.5";
        if (code.match(/^[12]?R/)) return currentLang==='zh' ? "Twist: 高度保持不变，旋转完整" : "Twist: constant height, full rotation";
        return currentLang==='zh' ? "请查阅官方规则" : "Check official rules";
    }

    function parseSequence(codesStr) {
        let tokens = codesStr.trim().split(/[\s,]+/).filter(t => t);
        let total = 0, unknown = [], details = [];
        tokens.forEach(code => {
            let v = difficultyMap[code];
            if (v !== undefined) { total += v; details.push({code, value: v}); }
            else { unknown.push(code); details.push({code, value: '?'}); }
        });
        return { total, finalScore: total + 0.5, unknown, count: tokens.length, details };
    }
    
    function getFamily(code) {
        if (code.startsWith("T")) return "T";
        if (code.startsWith("S")) return "S";
        if (code.match(/^[12]?R/)) return "R";
        if (code.startsWith("A")) return "A";
        if (code.startsWith("F")) return "F";
        return "X";
    }
    
    function checkHybrid(codesStr) {
        let tokens = codesStr.trim().split(/[\s,]+/).filter(t => t);
        let errors = [];
        if (tokens.length < 5) errors.push(currentLang==='zh' ? `不足5个 (${tokens.length})` : `Less than 5 (${tokens.length})`);
        let famCount = {T:0,S:0,R:0,A:0,F:0};
        let codeCnt = new Map();
        tokens.forEach(code => {
            let f = getFamily(code);
            if (famCount.hasOwnProperty(f)) famCount[f]++;
            codeCnt.set(code, (codeCnt.get(code)||0)+1);
        });
        for (let [c,n] of codeCnt) if (n>3) errors.push(`${c} x${n} >3`);
        return { errors, warnings: errors.length ? [] : ["OK"], families: Object.keys(famCount).filter(f=>famCount[f]>0) };
    }
    
    function checkGlobalFamilies(allFamilies) {
        let global = new Set();
        allFamilies.forEach(fams => fams.forEach(f => global.add(f)));
        let missing = ["T","S","R","A","F"].filter(r => !global.has(r));
        return { pass: missing.length===0, missing };
    }
    
    function generateRiskHTML(sequencesArr, acroData) {
        if ((!sequencesArr || sequencesArr.length === 0) && (!acroData || acroData.length === 0)) return `<div>${t('riskEmpty')}</div>`;
        let html = '';
        if (sequencesArr) {
            sequencesArr.forEach((seq, idx) => {
                let codes = seq.trim().split(/[\s,]+/).filter(t => t);
                if (codes.length === 0) return;
                html += `<div style="margin-bottom: 15px;"><strong>${t('hybrid')} ${idx+1}</strong><br>`;
                codes.forEach(code => {
                    let risk = getRiskMsg(code);
                    let val = difficultyMap[code];
                    let valStr = (val !== undefined) ? val.toFixed(2) : '?';
                    html += `<div class="risk-item"><span class="risk-code">${code} (${valStr})</span><br>${risk}</div>`;
                });
                html += `</div><hr>`;
            });
        }
        if (acroData && acroData.length) {
            html += `<div><strong>${t('acroTitle')}</strong><br>`;
            acroData.forEach(acro => {
                if (acro.code) {
                    html += `<div class="risk-item"><span class="risk-code">${acro.code} (${(acro.value||0).toFixed(2)})</span><br>${getRiskMsg(acro.code)}</div>`;
                }
            });
            html += `</div>`;
        }
        return html || `<div>${t('riskEmpty')}</div>`;
    }

    function getRequiredHybridCount(ageGroup) {
        if (ageGroup === 'senior' || ageGroup === 'junior') return 6;
        if (ageGroup === 'youth') return 5;
        return 4;
    }
    
    function getRequiredAcroCount(discipline, ageGroup) {
        if (discipline === 'soloWomen' || discipline === 'soloMen') return 0;
        if (discipline === 'duetWomen') return 2;
        if (discipline === 'mixedDuet') return 3;
        return 3;
    }

    // 云端保存记录（静默保存，无提示）
    async function saveToCloud(record) {
        if (!supabaseEnabled) return false;
        try {
            const disciplineSelect = document.getElementById('disciplineSelect');
            const ageCategorySelect = document.getElementById('ageCategorySelect');
            const discipline = disciplineSelect?.options[disciplineSelect.selectedIndex]?.text || '';
            const ageGroup = ageCategorySelect?.options[ageCategorySelect.selectedIndex]?.text || '';
            
            const dataFingerprint = JSON.stringify({
                sequences: record.sequences,
                totalScore: record.totalScore,
                athleteName: record.info?.athleteName,
                discipline: discipline
            });
            
            if (lastSavedData === dataFingerprint) {
                console.log("数据未变化，跳过自动保存");
                return true;
            }
            lastSavedData = dataFingerprint;
            
            const { error } = await supabaseClient
                .from('user_records')
                .insert([{
                    local_id: record.id,
                    name: record.name,
                    sequences: record.sequences,
                    total_score: record.totalScore,
                    global_pass: record.globalPass,
                    athlete_name: record.info?.athleteName || '',
                    event_name: record.info?.eventName || '',
                    age_group: ageGroup,
                    theme: record.info?.theme || '',
                    music_title: record.info?.musicTitle || '',
                    notes: record.info?.notes || '',
                    acrobatics: record.info?.acrobatics || [],
                    risk_html: record.riskHTML || '',
                    created_at: new Date(record.timestamp).toISOString(),
                    user_agent: navigator.userAgent,
                    screen_size: `${window.screen.width}x${window.screen.height}`,
                    discipline: discipline
                }]);
            if (error) throw error;
            console.log("已静默保存到云端:", record.name);
            return true;
        } catch (err) {
            console.error("云端保存失败:", err);
        }
        return false;
    }

    function closeAdminModal() { document.getElementById('adminModal').style.display = 'none'; }
    
    function loadRecordToEditor(rec) {
        if (rec.sequences.length !== currentRequiredCount) {
            rebuildHybridInputs(rec.sequences.length);
        }
        for (let i=0; i<rec.sequences.length; i++) {
            let ta = document.getElementById(`seq-${i}`);
            if (ta) ta.value = rec.sequences[i] || '';
        }
        if (rec.info) {
            let fields = ['athleteName', 'eventName', 'ageGroup', 'theme', 'musicTitle', 'notes'];
            fields.forEach(f => { let el = document.getElementById(f); if(el && rec.info[f]) el.value = rec.info[f]; });
            if (rec.info.acrobatics) {
                let needed = getRequiredAcroCount(document.getElementById('disciplineSelect')?.value || 'duetWomen', document.getElementById('ageCategorySelect')?.value || 'senior');
                rebuildAcroInputs(needed);
                for (let i=0; i<rec.info.acrobatics.length && i<needed; i++) {
                    let inputs = document.querySelectorAll('.acro-row');
                    if (inputs[i]) {
                        let codeInput = inputs[i].querySelector('.acro-code');
                        let valInput = inputs[i].querySelector('.acro-val');
                        if (codeInput) codeInput.value = rec.info.acrobatics[i].code;
                        if (valInput) valInput.value = rec.info.acrobatics[i].value;
                        acroList[i] = { code: rec.info.acrobatics[i].code, value: rec.info.acrobatics[i].value };
                    }
                }
            }
        }
        performCalculation();
    }

    function getAcroTotal() { return acroList.reduce((sum, a) => sum + (a.value || 0), 0); }

    function performCalculation() {
        let hyTotal = 0, allFamilies = [], seqData = [];
        let actualCount = 0;
        for (let i = 0; i < currentRequiredCount; i++) {
            let ta = document.getElementById(`seq-${i}`);
            if (ta) {
                sequences[i] = ta.value;
                actualCount++;
            } else { sequences[i] = ""; }
            seqData[i] = sequences[i];
            let { finalScore, unknown, details } = parseSequence(sequences[i]);
            hyTotal += finalScore;
            let scoreSpan = document.getElementById(`score-${i}`);
            if (scoreSpan) scoreSpan.innerText = `DD: ${finalScore.toFixed(2)}` + (unknown.length ? ` ? ${unknown.join(',')}` : '');
            let { errors, warnings, families } = checkHybrid(sequences[i]);
            let div = document.getElementById(`check-${i}`);
            if (div) {
                let html = errors.length ? `<div style="color:red;">${errors.join('<br>')}</div>` : `<div style="color:green;">✓ ${t('hybridPass')}</div>`;
                if (unknown.length) html += `<div style="color:red;">? ${t('unknownCode')}: ${unknown.join(',')}</div>`;
                html += `<div class="code-values">${t('codeValues')} ${details.map(d => `${d.code}:${d.value === '?' ? '?' : d.value.toFixed(2)}`).join(', ')}</div>`;
                div.innerHTML = html;
            }
            allFamilies.push(families);
        }
        let { pass, missing } = checkGlobalFamilies(allFamilies);
        let acroTotal = getAcroTotal();
        let finalTotal = hyTotal + acroTotal;
        let totalDiv = document.getElementById('totalScore');
        let msg = pass ? t('globalPass') : t('globalFail') + missing.join(',');
        let countMsg = (actualCount !== currentRequiredCount) ? ` ⚠️ ${t('warningCount')}` : ` ✓ ${t('countOk')}`;
        if (totalDiv) {
            totalDiv.style.background = (actualCount === currentRequiredCount && pass) ? "#1e3c72" : "#b71c1c";
            totalDiv.innerHTML = `🏆 ${t('totalWithAcro')}: ${finalTotal.toFixed(2)} &nbsp;&nbsp; ${msg}${countMsg}<br><span style="font-size:0.7rem;">📊 ${t('hybrid')}: ${hyTotal.toFixed(2)} | 🏅 ${t('acroTitle')}: ${acroTotal.toFixed(2)}</span>`;
        }
        currentHybridTotal = hyTotal;
        currentGlobalPass = pass;
        currentSequences = [...seqData];
        
        let riskContainer = document.getElementById('riskReportContainer');
        if (riskContainer && riskContainer.style.display !== 'none') {
            document.getElementById('riskContent').innerHTML = generateRiskHTML(currentSequences, acroList);
        }
        
        // 静默自动保存到云端（无提示）
        autoSaveOnCalculate();
    }

    function showRisk() {
        let html = generateRiskHTML(currentSequences, acroList);
        document.getElementById('riskContent').innerHTML = html;
        document.getElementById('riskReportContainer').style.display = 'block';
    }
    
    function showSuggestions() {
        let totalScore = currentHybridTotal + getAcroTotal();
        let sugg = [];
        if (currentLang === 'zh') {
            sugg.push(`总难度：${totalScore.toFixed(2)}`);
            if (totalScore > 35) sugg.push(`难度偏高(>35)，建议降低`);
            else if (totalScore < 20) sugg.push(`难度偏低，可增加高难度动作`);
            let families = new Set();
            for (let seq of currentSequences) {
                let codes = seq.trim().split(/[\s,]+/);
                codes.forEach(c => families.add(getFamily(c)));
            }
            let missing = ["T","S","R","A","F"].filter(f => !families.has(f));
            if (missing.length) sugg.push(`缺少家族：${missing.join(', ')}`);
            sugg.push(`建议：高难度动作放在开头或结尾`);
        } else {
            sugg.push(`Total: ${totalScore.toFixed(2)}`);
            if (totalScore > 35) sugg.push(`High difficulty (>35), reduce`);
            let families = new Set();
            for (let seq of currentSequences) {
                let codes = seq.trim().split(/[\s,]+/);
                codes.forEach(c => families.add(getFamily(c)));
            }
            let missing = ["T","S","R","A","F"].filter(f => !families.has(f));
            if (missing.length) sugg.push(`Missing families: ${missing.join(', ')}`);
        }
        let modalHtml = `<div id="suggestionsModal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; z-index:1000;"><div style="background:white; border-radius:28px; max-width:500px; width:90%; padding:20px;"><h3>${currentLang === 'zh' ? '设计建议' : 'Suggestions'}</h3><ul>${sugg.map(s => `<li>${s}</li>`).join('')}</ul><button onclick="this.closest('#suggestionsModal').remove()">${t('close')}</button></div></div>`;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
    }

    function rebuildHybridInputs(requiredCount) {
        const container = document.getElementById('seqContainer');
        if (!container) return;
        container.innerHTML = '';
        sequences = new Array(requiredCount).fill("");
        for (let i = 0; i < requiredCount; i++) {
            sequences[i] = "T8 A8 F5a F5a F7 RC1";
            const card = document.createElement('div');
            card.className = 'seq-card';
            card.innerHTML = `
                <div class="seq-header">
                    <span class="seq-title">${t('hybrid')} ${i+1}</span>
                    <span class="seq-score" id="score-${i}">DD: --</span>
                </div>
                <textarea class="seq-input" id="seq-${i}" rows="2">${sequences[i]}</textarea>
                <div class="check-results" id="check-${i}">${t('hybridPass')}</div>
            `;
            container.appendChild(card);
            const textarea = document.getElementById(`seq-${i}`);
            textarea.addEventListener('input', () => {
                sequences[i] = textarea.value;
                if (hasConsented) performCalculation();
            });
        }
        currentRequiredCount = requiredCount;
        if (hasConsented) performCalculation();
    }

    function rebuildAcroInputs(requiredCount) {
        const container = document.getElementById('acroList');
        if (!container) return;
        container.innerHTML = '';
        acroList = [];
        for (let i = 0; i < requiredCount; i++) {
            acroList.push({ code: '', value: 0 });
            const row = document.createElement('div');
            row.className = 'acro-row';
            row.innerHTML = `
                <input type="text" class="acro-code" placeholder="例: L" style="width:130px;">
                <input type="number" step="0.01" class="acro-val" value="0" style="width:90px;">
            `;
            const codeInput = row.querySelector('.acro-code');
            const valInput = row.querySelector('.acro-val');
            const idx = i;
            codeInput.addEventListener('input', (e) => {
                const newCode = e.target.value.trim();
                const mapped = acroMap[newCode];
                if (mapped !== undefined) {
                    valInput.value = mapped;
                    acroList[idx] = { code: newCode, value: mapped };
                    codeInput.classList.remove('error');
                } else {
                    valInput.value = 0;
                    acroList[idx] = { code: newCode, value: 0 };
                    codeInput.classList.add('error');
                }
                if (hasConsented) performCalculation();
            });
            valInput.addEventListener('input', (e) => {
                acroList[idx].value = parseFloat(e.target.value) || 0;
                if (hasConsented) performCalculation();
            });
            container.appendChild(row);
        }
        currentRequiredAcro = requiredCount;
        if (hasConsented) performCalculation();
    }

    // 导出本地记录（用户主动保存的记录）
    function exportLocalRecords() {
        let hist = loadHistory();
        if (hist.length === 0) {
            alert(t('noDataExport'));
            return;
        }
        const wb = XLSX.utils.book_new();
        const rows = [["名称","总分","状态","姓名","比赛","年龄组","主题","音乐","备注", ...Array(Math.max(...hist.map(r=>r.sequences.length), currentRequiredCount)).fill(0).map((_,i)=>`Hybrid${i+1}`), "创建时间"]];
        hist.forEach(rec => {
            let info = rec.info || {};
            let seqs = [...rec.sequences];
            while(seqs.length < currentRequiredCount) seqs.push("");
            rows.push([
                rec.name, 
                (rec.totalScore + (info.acrobatics?.reduce((s,a)=>s+(a.value||0),0) || 0)).toFixed(2), 
                rec.globalPass ? "通过" : "不通过", 
                info.athleteName || "", 
                info.eventName || "", 
                info.ageGroup || "",
                info.theme || "",
                info.musicTitle || "",
                info.notes || "",
                ...seqs,
                new Date(rec.timestamp).toLocaleString()
            ]);
        });
        const ws = XLSX.utils.aoa_to_sheet(rows);
        XLSX.utils.book_append_sheet(wb, ws, "本地记录");
        XLSX.writeFile(wb, `local_records_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.xlsx`);
        alert(`导出成功！共 ${hist.length} 条本地记录`);
    }

        currentLang = currentLang === 'en' ? 'zh' : 'en';
        document.getElementById('langBtn').innerHTML = currentLang === 'en' ? 'EN' : '中文';
        document.getElementById('titleText').innerText = t('title');
        document.getElementById('subText').innerText = t('sub');
        document.getElementById('calcBtn').innerText = t('calc');
        document.getElementById('saveBtn').innerText = t('save');
        document.getElementById('exportBtn').innerText = t('export');
        document.getElementById('riskBtn').innerText = t('risk');
        document.getElementById('suggestionsBtn').innerText = t('suggestions');
        document.getElementById('clearHistoryBtn').innerText = t('clearAll');
        document.getElementById('riskCardTitle').innerText = t('riskCardTitle');
        document.getElementById('historyCardTitle').innerText = t('historyTitle');
        document.getElementById('privacyLinkText').innerText = t('privacyLink');
        document.getElementById('acroTitle').innerText = t('acroTitle');
        document.getElementById('helpTitle').innerText = t('helpTitle');
        document.getElementById('helpText').innerHTML = t('helpText');

    // 语言选择初始化
    function initLanguageSelection() {
        const savedLang = localStorage.getItem('appLanguage');
        if (savedLang && (savedLang === 'en' || savedLang === 'zh')) {
            currentLang = savedLang;
            document.getElementById('languageModal').style.display = 'none';
            buildApp();
        } else {
            document.getElementById('languageModal').style.display = 'flex';
            document.getElementById('selectEnglish').onclick = () => {
                currentLang = 'en';
                localStorage.setItem('appLanguage', 'en');
                document.getElementById('languageModal').style.display = 'none';
                buildApp();
            };
            document.getElementById('selectChinese').onclick = () => {
                currentLang = 'zh';
                localStorage.setItem('appLanguage', 'zh');
                document.getElementById('languageModal').style.display = 'none';
                buildApp();
            };
        }
    }

            </div>
