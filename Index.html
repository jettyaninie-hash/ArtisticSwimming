    function getRiskMsg(code) {
        if (code.startsWith("T")) return currentLang==='zh' ? "⚠️ Thrust: 高度需达3.5，旋转须逐渐下降" : "⚠️ Thrust: height ≥3.5, spin must descend";

        if (code.match(/^[12]?R/)) return currentLang==='zh' ? "⚠️ Twist: 高度保持不变，旋转完整" : "⚠️ Twist: constant height, full rotation";
        return currentLang==='zh' ? "⚠️ 请查阅官方规则" : "⚠️ Check official rules";
    }
 
    function parseSequence(codesStr) {
        let tokens = codesStr.trim().split(/[\s,]+/).filter(t => t);
        let total = 0, unknown = [], details = [];
        tokens.forEach(code => {
            let v = difficultyMap[code];
            if (v !== undefined) { total += v; details.push({code, value: v}); }
            else { unknown.push(code); details.push({code, value: '?'}); }
        });
        return { total, finalScore: total + 0.5, unknown, count: tokens.length, details };
    }
    
    function getFamily(code) {
        if (code.startsWith("T")) return "T";
        if (code.startsWith("S")) return "S";
        if (code.match(/^[12]?R/)) return "R";
        if (code.startsWith("A")) return "A";
        if (code.startsWith("F")) return "F";
        return "X";
    }
    
    function checkHybrid(codesStr) {
        let tokens = codesStr.trim().split(/[\s,]+/).filter(t => t);
        let errors = [];
        if (tokens.length < 5) errors.push(currentLang==='zh' ? `❌ 不足5个 (${tokens.length})` : `❌ Less than 5 (${tokens.length})`);
        let famCount = {T:0,S:0,R:0,A:0,F:0};
        let codeCnt = new Map();
        tokens.forEach(code => {
            let f = getFamily(code);
            if (famCount.hasOwnProperty(f)) famCount[f]++;
            codeCnt.set(code, (codeCnt.get(code)||0)+1);
        });
        for (let [c,n] of codeCnt) if (n>3) errors.push(`${c} x${n} >3`);
        return { errors, warnings: errors.length ? [] : ["✅ OK"], families: Object.keys(famCount).filter(f=>famCount[f]>0) };
    }
    
    function checkGlobalFamilies(allFamilies) {
        let global = new Set();
        allFamilies.forEach(fams => fams.forEach(f => global.add(f)));
        let missing = ["T","S","R","A","F"].filter(r => !global.has(r));
        return { pass: missing.length===0, missing };
    }
    
    function generateRiskHTML(sequencesArr, acroData) {
        if ((!sequencesArr || sequencesArr.length === 0) && (!acroData || acroData.length === 0)) return `<div>${t('riskEmpty')}</div>`;
        let html = '';
        if (sequencesArr) {
            sequencesArr.forEach((seq, idx) => {
                let codes = seq.trim().split(/[\s,]+/).filter(t => t);
                if (codes.length === 0) return;
                html += `<div style="margin-bottom: 15px;"><strong>${t('hybrid')} ${idx+1}</strong><br>`;
                codes.forEach(code => {
                    let risk = getRiskMsg(code);
                    let val = difficultyMap[code];
                    let valStr = (val !== undefined) ? val.toFixed(2) : '?';
                    html += `<div class="risk-item"><span class="risk-code">${code} (${valStr})</span><br>${risk}</div>`;
                });
                html += `</div><hr>`;
            });
        }
        if (acroData && acroData.length) {
            html += `<div><strong>${t('acroTitle')}</strong><br>`;
            acroData.forEach(acro => {
                if (acro.code) {
                    html += `<div class="risk-item"><span class="risk-code">${acro.code} (${(acro.value||0).toFixed(2)})</span><br>${getRiskMsg(acro.code)}</div>`;
                }
            });
            html += `</div>`;
        }
        return html || `<div>${t('riskEmpty')}</div>`;
    }
 
    function getRequiredHybridCount(ageGroup) {
        if (ageGroup === 'senior' || ageGroup === 'junior') return 6;
        if (ageGroup === 'youth') return 5;
        return 4;
    }
    
    function getRequiredAcroCount(discipline, ageGroup) {
        if (discipline === 'soloWomen' || discipline === 'soloMen') return 0;
        if (discipline === 'duetWomen') return 2;
        if (discipline === 'mixedDuet') return 3;
        return 3;
    }

    // Supabase 云端同步函数
    async function syncToCloud() {
        if (!supabaseEnabled) {
            alert(currentLang === 'zh' ? "Supabase 未配置，请在代码中设置正确的 URL 和 anon key" : "Supabase not configured");
            return;
        }
        
        const syncBtn = document.getElementById('syncToCloudBtn');
        const originalText = syncBtn.innerText;
        syncBtn.innerText = currentLang === 'zh' ? "⏳ 同步中..." : "⏳ Syncing...";
        syncBtn.disabled = true;
        
        try {
            // 获取当前所有本地记录
            const records = loadHistory();
            
            for (const record of records) {
                // 检查是否已存在
                const { data: existing } = await supabaseClient
                    .from('difficulty_records')
                    .select('id')
                    .eq('local_id', record.id)
                    .maybeSingle();
                
                if (!existing) {
                    // 插入新记录
                    const { error } = await supabaseClient
                        .from('difficulty_records')
                        .insert([{
                            local_id: record.id,
                            name: record.name,
                            sequences: record.sequences,
                            total_score: record.totalScore,
                            global_pass: record.globalPass,
                            athlete_name: record.info?.athleteName || '',
                            event_name: record.info?.eventName || '',
                            age_group: record.info?.ageGroup || '',
                            theme: record.info?.theme || '',
                            music_title: record.info?.musicTitle || '',
                            notes: record.info?.notes || '',
                            acrobatics: record.info?.acrobatics || [],
                            risk_html: record.riskHTML || '',
                            created_at: new Date(record.timestamp || Date.now()).toISOString()
                        }]);
                    
                    if (error) console.error("Insert error:", error);
                }
            }
            
            alert(currentLang === 'zh' ? "✅ 已同步到云端！" : "✅ Synced to cloud!");
            updateSyncStatus(true);
        } catch (err) {
            console.error("Sync error:", err);
            alert(currentLang === 'zh' ? "❌ 同步失败: " + err.message : "❌ Sync failed: " + err.message);
            updateSyncStatus(false);
        } finally {
            syncBtn.innerText = originalText;
            syncBtn.disabled = false;
        }
    }
    
    async function loadFromCloud() {
        if (!supabaseEnabled) {
            alert(currentLang === 'zh' ? "Supabase 未配置" : "Supabase not configured");
            return;
        }
        
        const loadBtn = document.getElementById('loadFromCloudBtn');
        const originalText = loadBtn.innerText;
        loadBtn.innerText = currentLang === 'zh' ? "⏳ 加载中..." : "⏳ Loading...";
        loadBtn.disabled = true;
        
        try {
            const { data, error } = await supabaseClient
                .from('difficulty_records')
                .select('*')
                .order('created_at', { ascending: false });
            
            if (error) throw error;
            
            if (data && data.length > 0) {
                // 合并云端记录到本地
                const localRecords = loadHistory();
                const existingIds = new Set(localRecords.map(r => r.id));
                
                for (const cloudRecord of data) {
                    if (!existingIds.has(cloudRecord.local_id)) {
                        localRecords.push({
                            id: cloudRecord.local_id,
                            name: cloudRecord.name,
                            sequences: cloudRecord.sequences,
                            totalScore: cloudRecord.total_score,
                            globalPass: cloudRecord.global_pass,
                            info: {
                                athleteName: cloudRecord.athlete_name,
                                eventName: cloudRecord.event_name,
                                ageGroup: cloudRecord.age_group,
                                theme: cloudRecord.theme,
                                musicTitle: cloudRecord.music_title,
                                notes: cloudRecord.notes,
                                acrobatics: cloudRecord.acrobatics
                            },
                            riskHTML: cloudRecord.risk_html,
                            timestamp: new Date(cloudRecord.created_at).getTime()
                        });
                    }
                }
                
                // 按时间排序
                localRecords.sort((a, b) => b.timestamp - a.timestamp);
                saveHistory(localRecords);
                renderHistory();
                alert(currentLang === 'zh' ? `✅ 从云端加载了 ${data.length} 条记录` : `✅ Loaded ${data.length} records from cloud`);
            } else {
                alert(currentLang === 'zh' ? "云端暂无记录" : "No records in cloud");
            }
            updateSyncStatus(true);
        } catch (err) {
            console.error("Load error:", err);
            alert(currentLang === 'zh' ? "❌ 加载失败: " + err.message : "❌ Load failed: " + err.message);
            updateSyncStatus(false);
        } finally {
            loadBtn.innerText = originalText;
            loadBtn.disabled = false;
        }
    }

                statusSpan.className = 'sync-status synced';

            }, 3000);
        }
    }
    
    function addRecord(name, seqs, hyTotal, acroData, total, pass, info, riskHtml) {

            globalPass: pass, 
            info: {...info, acrobatics: acroData},

    function loadRecordToEditor(rec) {
        if (rec.sequences.length !== currentRequiredCount) {
            rebuildHybridInputs(rec.sequences.length);

        for (let i=0; i<rec.sequences.length; i++) {
            let ta = document.getElementById(`seq-${i}`);
            if (ta) ta.value = rec.sequences[i] || '';
        }

            let fields = ['athleteName', 'eventName', 'ageGroup', 'theme', 'musicTitle', 'notes'];
            fields.forEach(f => { let el = document.getElementById(f); if(el && rec.info[f]) el.value = rec.info[f]; });
            if (rec.info.acrobatics) {
                let needed = getRequiredAcroCount(document.getElementById('disciplineSelect')?.value || 'duetWomen', document.getElementById('ageCategorySelect')?.value || 'senior');
                rebuildAcroInputs(needed);
                for (let i=0; i<rec.info.acrobatics.length && i<needed; i++) {
                    let inputs = document.querySelectorAll('.acro-row');
                    if (inputs[i]) {
                        let codeInput = inputs[i].querySelector('.acro-code');
                        let valInput = inputs[i].querySelector('.acro-val');
                        if (codeInput) codeInput.value = rec.info.acrobatics[i].code;
                        if (valInput) valInput.value = rec.info.acrobatics[i].value;
                        acroList[i] = { code: rec.info.acrobatics[i].code, value: rec.info.acrobatics[i].value };
                    }
                }
            }
        }
        performCalculation();
    }
 
    function getAcroTotal() { return acroList.reduce((sum, a) => sum + (a.value || 0), 0); }
 
    function performCalculation() {
        let hyTotal = 0, allFamilies = [], seqData = [];
        let actualCount = 0;
        for (let i = 0; i < currentRequiredCount; i++) {
            let ta = document.getElementById(`seq-${i}`);
            if (ta) {
                sequences[i] = ta.value;
                actualCount++;
            } else { sequences[i] = ""; }
            seqData[i] = sequences[i];
            let { finalScore, unknown, details } = parseSequence(sequences[i]);
            hyTotal += finalScore;
            let scoreSpan = document.getElementById(`score-${i}`);
            if (scoreSpan) scoreSpan.innerText = `DD: ${finalScore.toFixed(2)}` + (unknown.length ? ` ⚠️ ${unknown.join(',')}` : '');
            let { errors, warnings, families } = checkHybrid(sequences[i]);
            let div = document.getElementById(`check-${i}`);
            if (div) {
                let html = errors.length ? `<div style="color:red;">${errors.join('<br>')}</div>` : `<div style="color:green;">✅ ${t('hybridPass')}</div>`;
                if (unknown.length) html += `<div style="color:red;">⚠️ ${t('unknownCode')}: ${unknown.join(',')}</div>`;
                html += `<div class="code-values">${t('codeValues')} ${details.map(d => `${d.code}:${d.value === '?' ? '?' : d.value.toFixed(2)}`).join(', ')}</div>`;
                div.innerHTML = html;
            }
            allFamilies.push(families);
        }
        let { pass, missing } = checkGlobalFamilies(allFamilies);
        let acroTotal = getAcroTotal();
        let finalTotal = hyTotal + acroTotal;
        let totalDiv = document.getElementById('totalScore');
        let msg = pass ? t('globalPass') : t('globalFail') + missing.join(',');
        let countMsg = (actualCount !== currentRequiredCount) ? ` ⚠️ ${t('warningCount')}` : ` ✓ ${t('countOk')}`;
        if (totalDiv) {
            totalDiv.style.background = (actualCount === currentRequiredCount && pass) ? "#1e3c72" : "#b71c1c";
            totalDiv.innerHTML = `🏆 ${t('totalWithAcro')}: ${finalTotal.toFixed(2)} &nbsp;&nbsp; ${msg}${countMsg}<br><span style="font-size:0.7rem;">📊 ${t('hybrid')}: ${hyTotal.toFixed(2)} | 🏅 ${t('acroTitle')}: ${acroTotal.toFixed(2)}</span>`;
        }
        currentHybridTotal = hyTotal;
        currentGlobalPass = pass;
        currentSequences = [...seqData];
        
        let riskContainer = document.getElementById('riskReportContainer');
        if (riskContainer && riskContainer.style.display !== 'none') {
            document.getElementById('riskContent').innerHTML = generateRiskHTML(currentSequences, acroList);
        }
    }

                let codes = seq.trim().split(/[\s,]+/);
                codes.forEach(c => families.add(getFamily(c)));

        let modalHtml = `<div id="suggestionsModal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; z-index:1000;"><div style="background:white; border-radius:28px; max-width:500px; width:90%; padding:20px;"><h3>${currentLang === 'zh' ? '💡 设计建议' : '💡 Suggestions'}</h3><ul>${sugg.map(s => `<li>${s}</li>`).join('')}</ul><button onclick="this.closest('#suggestionsModal').remove()">${t('close')}</button></div></div>`;

    function rebuildHybridInputs(requiredCount) {
        const container = document.getElementById('seqContainer');
        if (!container) return;
        container.innerHTML = '';
        sequences = new Array(requiredCount).fill("");
        for (let i = 0; i < requiredCount; i++) {
            sequences[i] = "T8 A8 F5a F5a F7 RC1";
            const card = document.createElement('div');
            card.className = 'seq-card';
            card.innerHTML = `
                <div class="seq-header">
                    <span class="seq-title">${t('hybrid')} ${i+1}</span>
                    <span class="seq-score" id="score-${i}">DD: --</span>
                </div>
                <textarea class="seq-input" id="seq-${i}" rows="2">${sequences[i]}</textarea>
                <div class="check-results" id="check-${i}">${t('hybridPass')}</div>
            `;
            container.appendChild(card);
            const textarea = document.getElementById(`seq-${i}`);
            textarea.addEventListener('input', () => {
                sequences[i] = textarea.value;
                if (hasConsented) performCalculation();
            });
        }
        currentRequiredCount = requiredCount;
        if (hasConsented) performCalculation();
    }
 
    function rebuildAcroInputs(requiredCount) {
        const container = document.getElementById('acroList');
        if (!container) return;
        container.innerHTML = '';
        acroList = [];
        for (let i = 0; i < requiredCount; i++) {
            acroList.push({ code: '', value: 0 });
            const row = document.createElement('div');
            row.className = 'acro-row';
            row.innerHTML = `
                <input type="text" class="acro-code" placeholder="例: L" style="width:130px;">
                <input type="number" step="0.01" class="acro-val" value="0" style="width:90px;">
            `;
            const codeInput = row.querySelector('.acro-code');
            const valInput = row.querySelector('.acro-val');
            const idx = i;
            codeInput.addEventListener('input', (e) => {
                const newCode = e.target.value.trim();
                const mapped = acroMap[newCode];
                if (mapped !== undefined) {
                    valInput.value = mapped;
                    acroList[idx] = { code: newCode, value: mapped };
                    codeInput.classList.remove('error');
                } else {
                    valInput.value = 0;
                    acroList[idx] = { code: newCode, value: 0 };
                    codeInput.classList.add('error');
                }
                if (hasConsented) performCalculation();
            });
            valInput.addEventListener('input', (e) => {
                acroList[idx].value = parseFloat(e.target.value) || 0;
                if (hasConsented) performCalculation();
            });
            container.appendChild(row);
        }
        currentRequiredAcro = requiredCount;
        if (hasConsented) performCalculation();
    }

        const content = document.getElementById('fullPolicyContent');
        if (currentLang === 'zh') {
            content.innerHTML = `<h3>完整隐私政策</h3><p>我们收集编排数据以改进计算器。数据存储在您的本地浏览器中。云端同步功能需要您手动触发，数据会加密传输到 Supabase。</p><h3>免责声明</h3><p>本工具非官方评判设备，使用风险自负。</p><p>如需删除数据，请联系: privacy@swimcalc.com</p>`;
        } else {
            content.innerHTML = `<h3>Full Privacy Policy</h3><p>We collect routine data to improve the calculator. Data is stored locally. Cloud sync is manual and encrypted.</p><h3>Disclaimer</h3><p>This is not an official judging tool. Use at your own risk.</p>`;
        }
        modal.style.display = 'flex';
    }
    
    function closeModal(modalId) { document.getElementById(modalId).style.display = 'none'; }
    function closeFullModal() { document.getElementById('fullPolicyModal').style.display = 'none'; }
    function closePrivacyModal() { document.getElementById('privacyModal').style.display = 'none'; }
 
    function checkConsentAndCalculate() {
        if (hasConsented) performCalculation();
        else showPrivacyModal();
    }
    
    function switchLang() {
        currentLang = currentLang === 'en' ? 'zh' : 'en';
        document.getElementById('langBtn').innerHTML = currentLang === 'en' ? '🇬🇧 EN' : '🇨🇳 中文';
        document.getElementById('titleText').innerText = t('title');
        document.getElementById('subText').innerText = t('sub');
        document.getElementById('calcBtn').innerText = t('calc');
        document.getElementById('saveBtn').innerText = t('save');
        document.getElementById('exportBtn').innerText = t('export');
        document.getElementById('exportAllBtn').innerText = t('exportSubmit');
        document.getElementById('riskBtn').innerText = t('risk');
        document.getElementById('suggestionsBtn').innerText = t('suggestions');
        document.getElementById('clearHistoryBtn').innerText = t('clearAll');
        document.getElementById('syncToCloudBtn').innerText = t('syncToCloud');
        document.getElementById('loadFromCloudBtn').innerText = t('syncFromCloud');
        document.getElementById('riskCardTitle').innerText = t('riskCardTitle');
        document.getElementById('historyCardTitle').innerText = t('historyTitle');
        document.getElementById('privacyLinkText').innerText = t('privacyLink');
        document.getElementById('acroTitle').innerText = t('acroTitle');
        document.getElementById('helpTitle').innerText = t('helpTitle');
        document.getElementById('helpText').innerHTML = t('helpText');
        document.getElementById('helpText2').innerHTML = t('helpText2');
        document.getElementById('rulesRefText').innerHTML = `${t('rulesRef')} <a href="${RULES_REF.link}" target="_blank">${t('rulesLink')}</a>`;
        for (let i=0;i<currentRequiredCount;i++) {
            let titleSpan = document.querySelector(`#seqContainer .seq-card:nth-child(${i+1}) .seq-title`);
            if (titleSpan) titleSpan.innerText = `${t('hybrid')} ${i+1}`;
        }
        if (hasConsented) performCalculation();
        renderHistory();
    }
 
    function buildApp() {
        const container = document.getElementById('app');
        container.innerHTML = `
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                <h1><span id="titleText">${t('title')}</span> <button id="langBtn" class="lang-switch">🇨🇳 中文</button></h1>
            </div>
            <div class="sub" id="subText">${t('sub')}</div>
            <div class="help-text">
                <strong id="helpTitle">${t('helpTitle')}</strong><br>
                <span id="helpText">${t('helpText')}</span><br>
                <span id="helpText2" style="font-size:0.7rem;">${t('helpText2')}</span>
            </div>
            <div class="info-panel">
                <div class="info-group"><label>${t('discipline')}</label>
                    <select id="disciplineSelect">
                        <option value="soloWomen">${t('soloWomen')}</option>
                        <option value="soloMen">${t('soloMen')}</option>
                        <option value="duetWomen">${t('duetWomen')}</option>
                        <option value="mixedDuet">${t('mixedDuet')}</option>
                        <option value="teamTech">${t('teamTech')}</option>
                        <option value="teamFree">${t('teamFree')}</option>
                        <option value="acro">${t('acro')}</option>
                        <option value="combo">${t('combo')}</option>
                    </select>
                </div>
                <div class="info-group"><label>${t('ageCategory')}</label>
                    <select id="ageCategorySelect">
                        <option value="senior">${t('ageSenior')}</option>
                        <option value="junior">${t('ageJunior')}</option>
                        <option value="youth">${t('ageYouth')}</option>
                        <option value="12U">${t('age12U')}</option>
                    </select>
                </div>
                <div class="info-group"><label>${t('name')}</label><input id="athleteName"></div>
                <div class="info-group"><label>${t('event')}</label><input id="eventName"></div>
                <div class="info-group"><label>${t('theme')}</label><input id="theme"></div>
                <div class="info-group"><label>${t('music')}</label><input id="musicTitle"></div>
                <div class="info-group"><label>${t('notes')}</label><textarea id="notes" rows="1"></textarea></div>
            </div>
            <div class="action-bar">
                <button id="calcBtn">${t('calc')}</button>
                <div id="totalScore" class="total-score">🏆 ${t('totalWithAcro')}: --</div>
                <div class="action-right">
                    <button id="saveBtn">${t('save')}</button>
                    <button id="exportBtn">${t('export')}</button>
                    <button id="exportAllBtn">📎 ${t('exportSubmit')}</button>
                    <button id="suggestionsBtn">${t('suggestions')}</button>
                </div>
            </div>
            <div class="two-columns">
                <div class="left-panel">
                    <div id="seqContainer"></div>
                    <div class="acro-panel">
                        <div class="acro-header"><strong id="acroTitle">🏅 ${t('acroTitle')}</strong></div>
                        <div id="acroList" class="acro-list"></div>
                    </div>
                </div>
                <div class="right-panel">
                    <div class="risk-card">
                        <h3 id="riskCardTitle">⚠️ ${t('riskCardTitle')}</h3>
                        <div id="riskReportContainer" class="risk-report" style="display:none;">
                            <div id="riskContent">${t('riskEmpty')}</div>
                        </div>
                        <button id="riskBtn" style="margin-top: 10px;">${t('risk')}</button>
                    </div>
                    <div class="history-card">
                        <h3 id="historyCardTitle">📋 ${t('historyTitle')}</h3>
                        <div style="display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap;">
                            <button id="syncToCloudBtn" class="success" style="font-size:0.7rem;">☁️ ${t('syncToCloud')}</button>
                            <button id="loadFromCloudBtn" style="font-size:0.7rem;">📥 ${t('syncFromCloud')}</button>
                            <span id="syncStatus" class="sync-status"></span>
                        </div>
                        <div style="max-height: 350px; overflow-y: auto;">
                            <table class="history-table"><thead><tr><th>${t('nameCol')}</th><th>${t('totalCol')}</th><th>${t('status')}</th><th>${t('action')}</th></tr></thead><tbody id="historyBody"></tbody></table>
                        </div>
                        <button id="clearHistoryBtn" style="margin-top: 10px;" class="danger">${t('clearAll')}</button>
                    </div>
                </div>
            </div>
            <div class="privacy-link"><a href="#" id="privacyLinkText">${t('privacyLink')}</a></div>
            <div class="version">${APP_VERSION} ${supabaseEnabled ? '☁️ 云端已连接' : '📁 本地模式'}</div>
            <div class="rules-ref" id="rulesRefText">${t('rulesRef')} <a href="${RULES_REF.link}" target="_blank">${t('rulesLink')}</a></div>
        `;
        
        // 初始化
        const savedConsent = localStorage.getItem('hybridCalculatorConsent');
        hasConsented = savedConsent === 'true';
        
        const ageSelect = document.getElementById('ageCategorySelect');
        const discSelect = document.getElementById('disciplineSelect');
        const requiredHy = getRequiredHybridCount(ageSelect.value);
        rebuildHybridInputs(requiredHy);
        const requiredAcro = getRequiredAcroCount(discSelect.value, ageSelect.value);
        rebuildAcroInputs(requiredAcro);
        
        ageSelect.addEventListener('change', () => {
            const newRequired = getRequiredHybridCount(ageSelect.value);
            if (newRequired !== currentRequiredCount) rebuildHybridInputs(newRequired);
            const newAcro = getRequiredAcroCount(discSelect.value, ageSelect.value);
            if (newAcro !== currentRequiredAcro) rebuildAcroInputs(newAcro);
            if (hasConsented) performCalculation();
        });
        discSelect.addEventListener('change', () => {
            const newAcro = getRequiredAcroCount(discSelect.value, ageSelect.value);
            if (newAcro !== currentRequiredAcro) rebuildAcroInputs(newAcro);
            if (hasConsented) performCalculation();
        });
        
        document.getElementById('calcBtn').addEventListener('click', checkConsentAndCalculate);
        document.getElementById('saveBtn').addEventListener('click', saveCurrentRecord);
        document.getElementById('exportBtn').addEventListener('click', exportExcel);
        document.getElementById('exportAllBtn').addEventListener('click', exportAllRecords);
        document.getElementById('riskBtn').addEventListener('click', showRisk);
        document.getElementById('suggestionsBtn').addEventListener('click', showSuggestions);
        document.getElementById('clearHistoryBtn').addEventListener('click', clearHistory);
        document.getElementById('langBtn').addEventListener('click', switchLang);
        document.getElementById('privacyLinkText').addEventListener('click', (e) => { e.preventDefault(); showFullPolicyModal(); });
        
        if (supabaseEnabled) {
            document.getElementById('syncToCloudBtn').addEventListener('click', syncToCloud);
            document.getElementById('loadFromCloudBtn').addEventListener('click', loadFromCloud);
        } else {
            document.getElementById('syncToCloudBtn').style.opacity = '0.5';
            document.getElementById('syncToCloudBtn').disabled = true;
            document.getElementById('loadFromCloudBtn').style.opacity = '0.5';
            document.getElementById('loadFromCloudBtn').disabled = true;
        }
        
        if (hasConsented) performCalculation();
        renderHistory();
    }
    
    buildApp();
</script>
 
<!-- 模态框 -->
<div id="privacyModal" class="modal">
    <div class="modal-content">
        <div id="privacyContent"></div>
        <button onclick="closePrivacyModal()" style="margin-top:15px;">${t('close')}</button>
    </div>
</div>
<div id="fullPolicyModal" class="modal">
    <div class="modal-content">
        <div id="fullPolicyContent"></div>
        <button onclick="closeFullModal()" style="margin-top:15px;">${t('close')}</button>
    </div>
</div>
 
<script>
    // 挂载全局模态框关闭函数
    window.closePrivacyModal = function() { document.getElementById('privacyModal').style.display = 'none'; };
    window.closeFullModal = function() { document.getElementById('fullPolicyModal').style.display = 'none'; };
</script>
</body>
</html>
