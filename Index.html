        let r = riskMessages[code];

        if (code.startsWith("T")) return currentLang==='zh' ? "Thrust动作：注意高度3.5，旋转需逐渐下降。" : "Thrust: min height 3.5, spin gradual.";

    // ---------- 辅助函数 ----------
    function parseSequence(codesStr) {
        let tokens = codesStr.trim().split(/[\s,]+/).filter(t => t);
        let total = 0, unknown = [], details = [];
        tokens.forEach(code => {
            let v = difficultyMap[code];
            if (v !== undefined) { total += v; details.push({code, value: v}); }
            else { unknown.push(code); details.push({code, value: '?'}); }
        });
        return { total, finalScore: total + 0.5, unknown, count: tokens.length, details };
    }
    function getFamily(code) {
        if (code.startsWith("T")) return "T";
        if (code.startsWith("S")) return "S";
        if (code.match(/^[12]?R/)) return "R";
        if (code.startsWith("A")) return "A";
        if (code.startsWith("F")) return "F";
        if (code.startsWith("C")) return "C";
        return "X";
    }
    function checkHybrid(codesStr) {
        let tokens = codesStr.trim().split(/[\s,]+/).filter(t => t);
        let errors = [], warnings = [];
        if (tokens.length < 5) errors.push(currentLang==='zh' ? `❌ 动作不足5个 (${tokens.length})` : `❌ Less than 5 moves (${tokens.length})`);
        let famCount = {T:0,S:0,R:0,A:0,F:0,C:0};
        let codeCnt = new Map();
        tokens.forEach(code => {
            let f = getFamily(code);
            if (famCount.hasOwnProperty(f)) famCount[f]++;
            codeCnt.set(code, (codeCnt.get(code)||0)+1);
        });
        for (let f of ["T","S","R","A","F","C"]) {
            if (famCount[f] > 5) errors.push(currentLang==='zh' ? `❌ ${f}家族出现${famCount[f]}次 >5` : `❌ Family ${f} appears ${famCount[f]} times >5`);
        }
        for (let [c,n] of codeCnt) if (n>3) errors.push(currentLang==='zh' ? `❌ ${c} 出现${n}次 >3` : `❌ ${c} appears ${n} times >3`);
        if (!errors.length) warnings.push(currentLang==='zh' ? "✅ 规则通过" : "✅ Rules OK");
        return { errors, warnings, families: Object.keys(famCount).filter(f=>famCount[f]>0) };
    }
    function checkGlobalFamilies(allFamilies) {
        let global = new Set();
        allFamilies.forEach(fams => fams.forEach(f => global.add(f)));
        let required = ["T","S","R","A","F"];
        let missing = required.filter(r => !global.has(r));
        return { pass: missing.length===0, missing };
    }
    function generateRiskHTML(sequencesArr) {
        if (!sequencesArr || sequencesArr.length === 0) return `<div>${t('riskEmpty')}</div>`;
        let html = '';
        sequencesArr.forEach((seq, idx) => {
            let codes = seq.trim().split(/[\s,]+/).filter(t => t);
            if (codes.length === 0) return;
            html += `<div style="margin-bottom: 15px;"><strong>${t('hybrid')} ${idx+1}</strong><br>`;
            codes.forEach(code => {
                let risk = getRiskMsg(code);
                let val = difficultyMap[code];
                let valStr = (val !== undefined) ? val.toFixed(2) : '?';
                html += `<div class="risk-item"><span class="risk-code">${code} (${valStr})</span><br>${risk.replace(/\n/g, '<br>')}</div>`;
            });
            html += `</div><hr>`;
        });
        return html || `<div>${t('riskEmpty')}</div>`;
    }

    // ---------- Hybrid 数量规则 ----------
    function getRequiredHybridCount(ageGroup) {
        if (ageGroup === 'senior' || ageGroup === 'junior') return 6;
        if (ageGroup === 'youth') return 5;
        if (ageGroup === '12U') return 4;
        return 6;
    }

    // ---------- Acro 数量规则 ----------
    function getRequiredAcroCount(discipline, ageGroup) {
        if (discipline === 'soloWomen' || discipline === 'soloMen') return 0;
        if (discipline === 'duetWomen') {
            if (ageGroup === 'senior' || ageGroup === 'junior') return 2;
            return 1;
        }
        if (discipline === 'mixedDuet') {
            if (ageGroup === 'senior' || ageGroup === 'junior') return 3;
            if (ageGroup === 'youth') return 2;
            return 2;
        }
        if (discipline === 'teamTech' || discipline === 'teamFree' || discipline === 'acro' || discipline === 'combo') {
            return 3;
        }
        return 0;
    }

    let currentRequiredCount = 6;
    let sequences = [];

    let currentHybridTotal = 0, currentGlobalPass = true, currentSequences = [];

    function rebuildHybridInputs(requiredCount) {

            const textarea = document.getElementById(`seq-${i}`);

            const updateLiveErrors = () => {
                const raw = textarea.value;

                tokens.forEach(code => {

                });
                const errorsDiv = document.getElementById(`live-error-${i}`);
                if (errorsDiv) {

                    } else {
                        errorsDiv.innerHTML = '';
                        errorsDiv.style.display = 'none';
                    }
                }
            };

                    e.preventDefault();

    // ---------- Acro 动态生成 ----------
    let acroList = [];
    let currentRequiredAcro = 0;

    function rebuildAcroInputs(requiredCount) {
        const container = document.getElementById('acroList');
        if (!container) return;
        container.innerHTML = '';
        acroList = [];
        for (let i = 0; i < requiredCount; i++) {
            acroList.push({ code: '', value: 0 });
            const row = document.createElement('div');
            row.className = 'acro-row';
            row.innerHTML = `
                <input type="text" class="acro-code" placeholder="例: L>>" style="width:130px;">
                <input type="number" step="0.01" class="acro-val" value="0" style="width:90px;">
            `;
            const codeInput = row.querySelector('.acro-code');
            const valInput = row.querySelector('.acro-val');
            const idx = i;
            let lastErrorCode = '';
            codeInput.addEventListener('input', (e) => {
                const newCode = e.target.value.trim();
                const mapped = acroMap[newCode];
                if (mapped !== undefined) {
                    valInput.value = mapped;
                    acroList[idx].code = newCode;
                    acroList[idx].value = mapped;
                    codeInput.classList.remove('error');
                } else {
                    valInput.value = 0;
                    acroList[idx].code = newCode;
                    acroList[idx].value = 0;
                    codeInput.classList.add('error');
                    if (newCode !== '' && newCode !== lastErrorCode) {
                        lastErrorCode = newCode;
                        alert(currentLang === 'zh' ? `托举代码“${newCode}”未识别，请检查官方代码。` : `Acro code "${newCode}" not recognized.`);
                    } else if (newCode === '') {
                        codeInput.classList.remove('error');
                    }
                }
                if (hasConsented) performCalculation();
            });
            valInput.addEventListener('input', (e) => {
                acroList[idx].value = parseFloat(e.target.value) || 0;
                if (hasConsented) performCalculation();
            });
            container.appendChild(row);
        }
        currentRequiredAcro = requiredCount;
        if (hasConsented) performCalculation();
    }

    function getAcroTotal() {
        return acroList.reduce((sum, a) => sum + (a.value || 0), 0);
    }

    // ---------- 主计算函数 ----------
    function performCalculation() {
        const requiredCount = currentRequiredCount;
        let hyTotal = 0, allFamilies = [], seqData = [];
        let actualCount = 0;
        for (let i = 0; i < requiredCount; i++) {
            let ta = document.getElementById(`seq-${i}`);
            if (ta) {
                sequences[i] = ta.value;
                actualCount++;
            } else {
                sequences[i] = "";
            }
            seqData[i] = sequences[i];
            let { finalScore, unknown, details } = parseSequence(sequences[i]);
            hyTotal += finalScore;
            let scoreSpan = document.getElementById(`score-${i}`);
            if (scoreSpan) scoreSpan.innerText = `DD: ${finalScore.toFixed(2)}` + (unknown.length ? ` ⚠️ ${unknown.join(',')}` : '');
            let { errors, warnings, families } = checkHybrid(sequences[i]);
            let div = document.getElementById(`check-${i}`);
            if (div) {
                let html = errors.length ? `<div class="check-fail">${errors.join('<br>')}</div>` : `<div class="check-pass">✅ ${t('hybridPass')}</div>`;
                html += `<div style="font-size:0.7rem;">${warnings.join(' | ')}</div>`;
                if (unknown.length) html += `<div class="check-fail">⚠️ ${t('unknownCode')}: ${unknown.join(',')}</div>`;
                html += `<div class="code-values">${t('codeValues')} ${details.map(d => `${d.code}:${d.value === '?' ? '?' : d.value.toFixed(2)}`).join(', ')}</div>`;
                div.innerHTML = html;
            }
            allFamilies.push(families);
        }
        let { pass, missing } = checkGlobalFamilies(allFamilies);
        let totalDiv = document.getElementById('totalScore');
        let msg = pass ? t('globalPass') : t('globalFail') + missing.join(',');
        let acroTotal = getAcroTotal();
        let finalTotal = hyTotal + acroTotal;
        let countMsg = "";
        if (actualCount !== requiredCount) {
            countMsg = ` ⚠️ ${t('warningCount')} (应有${requiredCount}个Hybrid，实际${actualCount}个)`;
            totalDiv.style.background = "#b71c1c";
        } else {
            countMsg = ` ✓ ${t('countOk')}`;
            totalDiv.style.background = pass ? "#1e3c72" : "#b71c1c";
        }
        totalDiv.innerHTML = `🏆 ${t('totalWithAcro')}: ${finalTotal.toFixed(2)} &nbsp;&nbsp; ${msg}${countMsg}<br><span style="font-size:0.7rem;">📊 ${t('hybrid')}: ${hyTotal.toFixed(2)} | 🏅 ${t('acroTitle')}: ${acroTotal.toFixed(2)} (${acroList.length}/${currentRequiredAcro})</span>`;
        currentHybridTotal = hyTotal;
        currentGlobalPass = pass;
        currentSequences = [...seqData];
        if (document.getElementById('riskContent') && document.getElementById('riskReportContainer').style.display !== 'none') {
            document.getElementById('riskContent').innerHTML = generateRiskHTML(currentSequences);
        }
        if (hasConsented) {
            autoSubmitData('calculate', acroTotal);
        }
    }

    async function autoSubmitData(actionType = 'calculate', acroTotal = 0) {
        const athleteName = document.getElementById('athleteName').value;
        const eventName = document.getElementById('eventName').value;
        const ageGroupSelect = document.getElementById('ageCategorySelect');
        const ageGroup = ageGroupSelect.options[ageGroupSelect.selectedIndex]?.text || '';
        const disciplineSelect = document.getElementById('disciplineSelect');
        const discipline = disciplineSelect.options[disciplineSelect.selectedIndex]?.text || '';
        const theme = document.getElementById('theme').value;
        const musicTitle = document.getElementById('musicTitle').value;
        const notes = document.getElementById('notes').value;
        const hybridValues = [];
        for (let i=0; i<currentRequiredCount; i++) {
            hybridValues.push(document.getElementById(`seq-${i}`)?.value || '');
        }
        const totalScore = currentHybridTotal + acroTotal;
        const globalPass = currentGlobalPass;
        const riskContent = document.getElementById('riskContent')?.innerText || '';
        const acroData = acroList.map(a => ({ code: a.code, value: a.value }));
        const payload = {
            action: actionType,
            athleteName, eventName, ageGroup, discipline, theme, musicTitle, notes,
            hybrids: hybridValues,
            totalScore, globalPass, riskReport: riskContent,
            acrobatics: acroData
        };
        try {
            const response = await fetch('/api/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (response.ok) console.log(`Auto-submit success (action: ${actionType})`);
            else console.warn(`Auto-submit failed (action: ${actionType})`);
        } catch (err) { console.error("Auto-submit error:", err); }
    }

    function generateSuggestions() {
        let totalScore = currentHybridTotal + getAcroTotal();
        let highRisk = new Set();
        for (let seq of currentSequences) {
            let codes = seq.trim().split(/[\s,]+/);
            codes.forEach(c => { if (riskMessages[c]) highRisk.add(c); });
        }
        let disc = document.getElementById('disciplineSelect')?.value || '';
        let age = document.getElementById('ageCategorySelect')?.value || '';
        let discText = currentLang==='zh' ? getDisciplineTextZh(disc) : getDisciplineTextEn(disc);
        let ageText = currentLang==='zh' ? getAgeTextZh(age) : getAgeTextEn(age);
        let sugg = [];
        if (currentLang==='zh') {
            sugg.push(`📊 项目：${discText} | 年龄组：${ageText}`);
            sugg.push(`📊 Hybrid总难度分：${currentHybridTotal.toFixed(2)}`);
            let required = getRequiredHybridCount(age);
            let actual = currentSequences.length;
            if (actual !== required) sugg.push(`⚠️ Hybrid数量不正确：应有${required}个，实际${actual}个。`);
            let requiredAcro = getRequiredAcroCount(disc, age);
            if (requiredAcro > 0 && acroList.length !== requiredAcro) sugg.push(`⚠️ 托举数量：当前${acroList.length}个，需要${requiredAcro}个。`);
            if (disc === 'soloWomen' || disc === 'soloMen') {
                sugg.push(`📌 单人项目：不包含托举，总难度分即Hybrid分。`);
                if (currentHybridTotal > 32) sugg.push(`⚠️ 单人难度偏高（>32），建议控制。`);
            } else {
                let acroTotal = getAcroTotal();
                sugg.push(`📌 双人/集体项目：托举总分：${acroTotal.toFixed(2)}，总难度分：${totalScore.toFixed(2)}`);
                if (age === '12U' && acroTotal > 2.8) sugg.push(`⚠️ 12岁以下组托举难度不得超过2.8（参照安全限制）。`);
                if (age === 'youth' && acroTotal > 3.2) sugg.push(`⚠️ 青年组托举难度建议不超过3.2。`);
            }
            if (totalScore > 35) sugg.push(`⚠️ 难度偏高（>35），建议降低1-2分。`);
            else if (totalScore < 25) sugg.push(`✅ 难度适中，可适当增加高难度动作。`);
            else sugg.push(`✅ 难度适中。`);
            if (highRisk.size) sugg.push(`⚠️ 高风险动作：${[...highRisk].join(', ')}。建议替换。`);
            let families = new Set();
            for (let seq of currentSequences) {
                let codes = seq.trim().split(/[\s,]+/);
                codes.forEach(c => families.add(getFamily(c)));
            }
            let missing = ["T","S","R","A","F"].filter(f => !families.has(f));
            if (missing.length) sugg.push(`❌ 缺少家族：${missing.join(', ')}。`);
            sugg.push(`💡 建议：难度最高的Hybrid放在开头或结尾，高风险动作分散。`);
        } else {
            // 英文版略
            sugg.push(`📊 Discipline: ${discText} | Age: ${ageText}`);
            sugg.push(`📊 Hybrid Total: ${currentHybridTotal.toFixed(2)}`);
            let required = getRequiredHybridCount(age);
            let actual = currentSequences.length;
            if (actual !== required) sugg.push(`⚠️ Hybrid count: should be ${required}, but ${actual}.`);
            let requiredAcro = getRequiredAcroCount(disc, age);
            if (requiredAcro > 0 && acroList.length !== requiredAcro) sugg.push(`⚠️ Acro count: ${acroList.length}, required ${requiredAcro}.`);
            if (disc === 'soloWomen' || disc === 'soloMen') {
                if (currentHybridTotal > 32) sugg.push(`⚠️ Solo difficulty high (>32).`);
            } else {
                let acroTotal = getAcroTotal();
                sugg.push(`📌 Acro total: ${acroTotal.toFixed(2)}. Total: ${totalScore.toFixed(2)}`);
                if (age === '12U' && acroTotal > 2.8) sugg.push(`⚠️ Age 12U acro limit 2.8.`);
            }
            if (totalScore > 35) sugg.push(`⚠️ High difficulty (>35), reduce.`);
            if (highRisk.size) sugg.push(`⚠️ High-risk moves: ${[...highRisk].join(', ')}.`);
            let families = new Set();
            for (let seq of currentSequences) {
                let codes = seq.trim().split(/[\s,]+/);
                codes.forEach(c => families.add(getFamily(c)));
            }
            let missing = ["T","S","R","A","F"].filter(f => !families.has(f));
            if (missing.length) sugg.push(`❌ Missing families: ${missing.join(', ')}.`);
            sugg.push(`💡 Tip: Place hardest hybrid first/last.`);
        }
        return sugg;
    }
    function getDisciplineTextZh(v) { const m={soloWomen:'女子单人',soloMen:'男子单人',duetWomen:'女子双人',mixedDuet:'混合双人',teamTech:'集体技术',teamFree:'集体自由',acro:'技巧',combo:'自由组合'}; return m[v]||v; }
    function getDisciplineTextEn(v) { const m={soloWomen:'Women Solo',soloMen:'Men Solo',duetWomen:'Women Duet',mixedDuet:'Mixed Duet',teamTech:'Team Tech',teamFree:'Team Free',acro:'Acrobatic',combo:'Free Combo'}; return m[v]||v; }
    function getAgeTextZh(v) { const m={'12U':'12岁及以下',youth:'青年组',junior:'少年组',senior:'成年组'}; return m[v]||v; }
    function getAgeTextEn(v) { const m={'12U':'12 & Under',youth:'Youth',junior:'Junior',senior:'Senior'}; return m[v]||v; }

    // ---------- 历史记录 ----------
    const STORAGE_KEY = "HybridPWA";
    function loadHistory() { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
    function saveHistory(hist) { localStorage.setItem(STORAGE_KEY, JSON.stringify(hist)); }
    function addRecord(name, seqs, hyTotal, acroData, total, pass, info, riskHtml) {
        let hist = loadHistory();
        hist.unshift({ id: Date.now(), name, sequences: [...seqs], totalScore: hyTotal, globalPass: pass, info: {...info, acrobatics: acroData}, riskHTML: riskHtml });
        if (hist.length>50) hist.pop();
        saveHistory(hist);
        renderHistory();
    }
    function deleteRecord(id) {
        let hist = loadHistory().filter(r => r.id != id);
        saveHistory(hist);
        renderHistory();
    }
    function loadRecordToEditor(rec) {
        const required = rec.sequences.length;
        if (required !== currentRequiredCount) rebuildHybridInputs(required);
        for (let i=0;i<required;i++) if (document.getElementById(`seq-${i}`)) document.getElementById(`seq-${i}`).value = rec.sequences[i] || '';
        if (rec.info) {
            document.getElementById('athleteName').value = rec.info.athleteName || '';
            document.getElementById('eventName').value = rec.info.eventName || '';
            document.getElementById('ageGroup').value = rec.info.ageGroup || '';
            document.getElementById('theme').value = rec.info.theme || '';
            document.getElementById('musicTitle').value = rec.info.musicTitle || '';
            document.getElementById('notes').value = rec.info.notes || '';
            if (rec.info.acrobatics) {
                const requiredAcro = getRequiredAcroCount(document.getElementById('disciplineSelect')?.value || '', document.getElementById('ageCategorySelect')?.value || 'senior');
                rebuildAcroInputs(requiredAcro);
                for (let i=0; i<rec.info.acrobatics.length && i<requiredAcro; i++) {
                    if (rec.info.acrobatics[i].code) {
                        const inputs = document.querySelectorAll('.acro-row');
                        if (inputs[i]) {
                            const codeInput = inputs[i].querySelector('.acro-code');
                            const valInput = inputs[i].querySelector('.acro-val');
                            if (codeInput) codeInput.value = rec.info.acrobatics[i].code;
                            if (valInput) valInput.value = rec.info.acrobatics[i].value;
                            acroList[i].code = rec.info.acrobatics[i].code;
                            acroList[i].value = rec.info.acrobatics[i].value;
                            if (codeInput && !acroMap[rec.info.acrobatics[i].code]) codeInput.classList.add('error');
                        }
                    }
                }
            }
        }
        performCalculation();
    }
    function renderHistory() {
        let hist = loadHistory();
        let tbody = document.getElementById('historyBody');
        if (!hist.length) { tbody.innerHTML = `<tr><td colspan="4">${t('noRecord')}<\/td><\/tr>`; return; }
        let html = '';
        hist.forEach(rec => {
            let status = rec.globalPass ? '✅' : '❌';
            html += `<tr><td style="max-width:140px;">${rec.name}<\/td><td>${rec.totalScore.toFixed(2)}<\/td><td>${status}<\/td><td><button class="load-btn" data-id="${rec.id}">${t('load')}<\/button> <button class="delete-btn" data-id="${rec.id}">${t('delete')}<\/button><\/td><\/tr>`;
        });
        tbody.innerHTML = html;
        document.querySelectorAll('.load-btn').forEach(btn => btn.addEventListener('click', () => { let id = parseInt(btn.getAttribute('data-id')); let rec = loadHistory().find(r => r.id === id); if (rec) loadRecordToEditor(rec); }));
        document.querySelectorAll('.delete-btn').forEach(btn => btn.addEventListener('click', () => { let id = parseInt(btn.getAttribute('data-id')); deleteRecord(id); }));
    }
    function saveCurrentRecord() {
        let name = prompt(t('savePrompt'), new Date().toLocaleString());
        if (!name) return;
        let info = {
            athleteName: document.getElementById('athleteName').value,
            eventName: document.getElementById('eventName').value,
            ageGroup: document.getElementById('ageGroup').value,
            theme: document.getElementById('theme').value,
            musicTitle: document.getElementById('musicTitle').value,
            notes: document.getElementById('notes').value,
            acrobatics: acroList.map(a => ({ code: a.code, value: a.value }))
        };
        let riskHtml = generateRiskHTML(currentSequences);
        let acroTotal = getAcroTotal();
        let total = currentHybridTotal + acroTotal;
        addRecord(name, currentSequences, currentHybridTotal, acroList, total, currentGlobalPass, info, riskHtml);
        alert(t('savePrompt') + " " + name);
    }
    function clearHistory() {
        if (confirm(t('clearConfirm'))) { localStorage.removeItem(STORAGE_KEY); renderHistory(); }
    }

    // ---------- 语言切换 ----------
    function switchLang() {
        currentLang = currentLang === 'en' ? 'zh' : 'en';
        const btn = document.getElementById('langBtn');
        btn.innerHTML = currentLang === 'en' ? '🇬🇧 EN' : '🇨🇳 中文';
        document.getElementById('titleText').innerText = t('title');
        document.getElementById('subText').innerText = t('sub');
        document.getElementById('calcBtn').innerText = t('calc');
        document.getElementById('saveBtn').innerText = t('save');
        document.getElementById('exportBtn').innerText = t('export');
        document.getElementById('riskBtn').innerText = t('risk');
        document.getElementById('suggestionsBtn').innerText = t('suggestions');
        document.getElementById('clearHistoryBtn').innerText = t('clearAll');
        document.getElementById('riskCardTitle').innerText = t('riskCardTitle');
        document.getElementById('historyCardTitle').innerText = t('historyTitle');
        document.getElementById('privacyLinkText').innerText = t('privacyLink');
        document.getElementById('acroTitle').innerText = t('acroTitle');
        document.getElementById('helpTitle').innerText = t('helpTitle');
        document.getElementById('helpText').innerHTML = t('helpText');
        document.getElementById('helpText2').innerHTML = t('helpText2');
        document.getElementById('rulesRefText').innerHTML = `${t('rulesRef')} <a href="${RULES_REF.link}" target="_blank">${t('rulesLink')}</a>`;
        for (let i=0;i<currentRequiredCount;i++) {
            let titleSpan = document.querySelector(`#seqContainer .seq-card:nth-child(${i+1}) .seq-title`);
            if (titleSpan) titleSpan.innerText = `${t('hybrid')} ${i+1}`;
        }
        if (hasConsented && currentHybridTotal !== undefined) performCalculation();
        renderHistory();
        if (document.getElementById('riskReportContainer').style.display === 'block') showRisk();
    }

    // ---------- UI 构建 ----------
    function buildUI() {
        const container = document.getElementById('app');
        container.innerHTML = `
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                <h1><span id="titleText">${t('title')}</span> <button id="langBtn" class="lang-switch">🇬🇧 EN</button></h1>
            </div>
            <div class="sub" id="subText">${t('sub')}</div>
            <div class="help-text">
                <strong id="helpTitle">${t('helpTitle')}</strong><br>
                <span id="helpText">${t('helpText')}</span><br>
                <span id="helpText2" style="font-size:0.7rem;">${t('helpText2')}</span>
            </div>
            <div class="info-panel">
                <div class="info-group"><label>${t('discipline')}</label>
                    <select id="disciplineSelect">
                        <option value="soloWomen">${t('soloWomen')}</option>
                        <option value="soloMen">${t('soloMen')}</option>
                        <option value="duetWomen">${t('duetWomen')}</option>
                        <option value="mixedDuet">${t('mixedDuet')}</option>
                        <option value="teamTech">${t('teamTech')}</option>
                        <option value="teamFree">${t('teamFree')}</option>
                        <option value="acro">${t('acro')}</option>
                        <option value="combo">${t('combo')}</option>
                    </select>
                </div>
                <div class="info-group"><label>${t('ageCategory')}</label>
                    <select id="ageCategorySelect">
                        <option value="senior">${t('ageSenior')}</option>
                        <option value="junior">${t('ageJunior')}</option>
                        <option value="youth">${t('ageYouth')}</option>
                        <option value="12U">${t('age12U')}</option>
                    </select>
                </div>
                <div class="info-group"><label>${t('name')}</label><input id="athleteName"></div>
                <div class="info-group"><label>${t('event')}</label><input id="eventName"></div>
                <div class="info-group"><label>${t('theme')}</label><input id="theme"></div>
                <div class="info-group"><label>${t('music')}</label><input id="musicTitle"></div>
                <div class="info-group"><label>${t('notes')}</label><textarea id="notes" rows="1"></textarea></div>
            </div>
            <div class="action-bar">
                <button id="calcBtn">${t('calc')}</button>
                <div id="totalScore" class="total-score">🏆 ${t('totalWithAcro')}: --</div>
                <div class="action-right">
                    <button id="saveBtn">${t('save')}</button>
                    <button id="exportBtn">${t('export')}</button>
                    <button id="suggestionsBtn">${t('suggestions')}</button>
                </div>
            </div>
            <div class="two-columns">
                <div class="left-panel">
                    <div id="seqContainer"></div>
                    <div class="acro-panel">
                        <div class="acro-header">
                            <strong id="acroTitle">🏅 ${t('acroTitle')}</strong>
                        </div>
                        <div id="acroList" class="acro-list"></div>
                    </div>
                </div>
                <div class="right-panel">
                    <div class="risk-card">
                        <h3 id="riskCardTitle">⚠️ ${t('riskCardTitle')}</h3>
                        <div id="riskReportContainer" class="risk-report">
                            <div id="riskContent">${t('riskEmpty')}</div>
                        </div>
                        <button id="riskBtn" style="margin-top: 10px;">${t('risk')}</button>
                    </div>
                    <div class="history-card">
                        <h3 id="historyCardTitle">📋 ${t('historyTitle')}</h3>
                        <div style="max-height: 400px; overflow-y: auto;">
                            <table class="history-table"><thead><tr><th>${t('nameCol')}</th><th>${t('totalCol')}</th><th>${t('status')}</th><th>${t('action')}</th></tr></thead><tbody id="historyBody"></tbody></table>
                        </div>
                        <button id="clearHistoryBtn" style="margin-top: 10px;">${t('clearAll')}</button>
                    </div>
                </div>
            </div>
            <div class="privacy-link">
                <a href="#" id="privacyLinkText">${t('privacyLink')}</a>
            </div>
            <div class="version">${APP_VERSION}</div>
            <div class="rules-ref" id="rulesRefText">${t('rulesRef')} <a href="${RULES_REF.link}" target="_blank">${t('rulesLink')}</a></div>
        `;
        // 初始化Hybrid数量
        const ageSelect = document.getElementById('ageCategorySelect');
        const initialAge = ageSelect.value;
        const requiredHy = getRequiredHybridCount(initialAge);
        rebuildHybridInputs(requiredHy);
        // 初始化Acro数量
        const discSelect = document.getElementById('disciplineSelect');
        const requiredAcro = getRequiredAcroCount(discSelect.value, initialAge);
        rebuildAcroInputs(requiredAcro);
        // 监听变化
        ageSelect.addEventListener('change', () => {
            const newAge = ageSelect.value;
            const newRequiredHy = getRequiredHybridCount(newAge);
            if (newRequiredHy !== currentRequiredCount) rebuildHybridInputs(newRequiredHy);
            const newRequiredAcro = getRequiredAcroCount(discSelect.value, newAge);
            if (newRequiredAcro !== currentRequiredAcro) rebuildAcroInputs(newRequiredAcro);
            if (hasConsented) performCalculation();
        });
        discSelect.addEventListener('change', () => {
            const newDisc = discSelect.value;
            const newRequiredAcro = getRequiredAcroCount(newDisc, ageSelect.value);
            if (newRequiredAcro !== currentRequiredAcro) rebuildAcroInputs(newRequiredAcro);
            if (hasConsented) performCalculation();
        });
        // 事件绑定
        document.getElementById('calcBtn').addEventListener('click', checkConsentAndCalculate);
        document.getElementById('saveBtn').addEventListener('click', saveCurrentRecord);
        document.getElementById('exportBtn').addEventListener('click', exportExcel);
        document.getElementById('riskBtn').addEventListener('click', showRisk);
        document.getElementById('suggestionsBtn').addEventListener('click', showSuggestions);
        document.getElementById('clearHistoryBtn').addEventListener('click', clearHistory);
        document.getElementById('langBtn').addEventListener('click', switchLang);
        document.getElementById('privacyLinkText').addEventListener('click', (e) => { e.preventDefault(); showFullPolicyModal(); });
        // 初始计算
        performCalculation();
        renderHistory();
    }
    buildUI();
</script>
